# Baseline Training Config (512×512)
# data=baseline_aug, model=convnext_base 등 CNN 계열
# model에 따라 달라지는 값: batch_size, accumulate_grad_batches, stochastic_depth, use_amp

learning_rate: 5e-4
weight_decay: 0.05
epochs: 80
batch_size: 32
num_workers: 4
accumulate_grad_batches: 2

# 정규화
dropout_rate: 0.3
stochastic_depth: 0.1

# Mixup/CutMix (과적합 방지)
use_mixup: true
mixup_alpha: 0.8
cutmix_alpha: 1.0
mixup_prob: 0.5

# 옵티마이저
optimizer: "adamw"

# 스케줄러
scheduler: "cosine"
warmup_epochs: 5
warmup_start_factor: 0.01
scheduler_eta_min: 1e-6

# 데이터 로더
drop_last: true
pin_memory: true

# 조기 종료
early_stopping:
  enabled: true
  patience: 10
  monitor: "val_f1"
  mode: "max"

# 체크포인트
checkpoint:
  save_top_k: 3
  monitor: "val_f1"
  mode: "max"

# 로깅
log_interval: 20
val_check_interval: 1.0

# Loss
loss: "label_smoothing"
label_smoothing_value: 0.1

# Mixed Precision
use_amp: false
