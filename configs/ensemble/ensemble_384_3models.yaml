# Ensemble Configuration: 384x384 모델 2개 앙상블
# Transformer 모델들로만 구성

method: "soft_voting"  # hard_voting, soft_voting, rank_averaging

# 체크포인트 경로 (384x384 이미지 사용 모델만)
checkpoints:
  - "checkpoints/20260227_run_004/epoch=15-val_f1=0.948.ckpt"
  - "checkpoints/20260227_run_005/epoch=32-val_f1=0.931.ckpt"
  - "checkpoints/20260227_run_006/epoch=41-val_f1=0.949.ckpt"

# 가중치 (F1 Score 기반)
weights:
  - 0.948
  - 0.931
  - 0.949

# 출력 파일 경로
output: "datasets_fin/submission/ensemble_384_3models_soft.csv"

