# Ensemble Configuration: MaxVit K-Fold 5개 모델
# run_001 ~ run_005 앙상블

method: "soft_voting"  # soft_voting with weights
use_tta: true

# 체크포인트 경로 (K-Fold 5개)
checkpoints:
  - "checkpoints/20260301_run_003/epoch=28-val_f1=0.966.ckpt"
  - "checkpoints/20260301_run_003/epoch=38-val_f1=0.965.ckpt"
  - "checkpoints/20260301_run_004/epoch=27-val_f1=0.966.ckpt"
  - "checkpoints/20260301_run_005/epoch=35-val_f1=0.967.ckpt"
  - "checkpoints/20260301_run_005/epoch=46-val_f1=0.963.ckpt"

# 가중치 (Val F1 Score 기반)
weights:
  - 0.966  # run_003
  - 0.965  # run_004
  - 0.966  # run_004
  - 0.967  # run_005  
  - 0.963  # run_005

# 출력 파일 경로
output: "datasets_fin/submission/ensemble_binary_MaxVit_kfold_0301_01_soft.csv"

# 데이터 설정 (모델 학습 시와 동일하게)
data_config: "transformer_384"  # 384x384 이미지 사용

# 모델 정보
# - 모델: MaxViT-Base 384x384
# - K-Fold: 5-Fold Cross Validation
# - 평균 Val F1: 0.957
# - 앙상블 방법: Weighted Soft Voting
