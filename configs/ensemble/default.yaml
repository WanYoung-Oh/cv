# Ensemble 기본 설정
# 여러 모델의 예측을 결합하여 최종 예측 생성
# override: ensemble=ensemble_384_2models, ensemble=ensemble_768_3models 등

# 앙상블 방법
# - hard_voting: 다수결 (각 모델의 예측 클래스 중 최빈값)
# - soft_voting: 확률 평균 (각 모델의 확률을 평균내어 최종 예측)
# - rank_averaging: 순위 평균 (각 모델의 순위를 평균)
method: soft_voting

# TTA 사용 여부 (각 모델 예측 시 augmentation 평균, 시간 약 5~11배)
use_tta: false

# TTA 강도: "light" (5가지) | "standard" (8가지, D4 완전집합) | "heavy" (11가지, D4+스캔품질)
tta_level: "standard"

# true이면 checkpoints 무시하고, 현재 data img_size와 같은 모든 run의 best 체크포인트 자동 수집
use_all_runs: false

# 체크포인트 경로 리스트 (use_all_runs=false일 때 사용)
checkpoints:
  - checkpoints/champion/best_model.ckpt
  - checkpoints/20260219_run_001/epoch=13-val_f1=0.972.ckpt
  - checkpoints/20260219_run_005/epoch=46-val_f1=0.973.ckpt

# 모델 가중치 (선택사항, soft_voting에서만 사용)
# 각 모델의 val_f1 기반 가중치
weights:
  - 0.9877  # champion (가장 높은 성능)
  - 0.972   # run_001
  - 0.973   # run_005

# 출력 파일 경로
output: datasets_fin/submission/ensemble_3models.csv
