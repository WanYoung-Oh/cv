# 모든 학습 결과(동일 img_size) + 소프트 보팅 + TTA
# 사용: data=transformer_384 (384 모델만) 또는 data=baseline_aug (512 모델만)과 함께 지정
# 예: python src/ensemble.py data=transformer_384 ensemble=all_runs_soft_tta

method: soft_voting
use_tta: true
tta_level: "standard"  # "light" | "standard" | "heavy"
use_all_runs: true
checkpoints: []  # use_all_runs가 채움
weights: null   # use_all_runs 시 val_f1 기반 자동
output: datasets_fin/submission/ensemble_all_runs_soft_tta.csv
