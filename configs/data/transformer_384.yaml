# ============================================================
# Transformer 모델용 384×384 Data Config
# Swin-Base-384, ViT-Base-384 전용
# ============================================================
# 테스트 데이터 분석 기반 최적화 (3,140장 분석)
#
# [핵심 데이터 분포]
#   색상: grayscale 69% | low_saturation 18% | colored 13%
#   종이: white 76% | off_white 21% | tinted 3%
#   왜곡: high 66% | low 29% | none 5%
#   가림: none 67% | high 22% | low 11%
#   그림자: no 76% | yes 24%
#   노이즈: clean 82% | low 18%
#   선명도: sharp 52% | moderate 47% | blurry <1%
#   대비: mean 0.38 (낮음) → CLAHE 필수
#   방향: normal 64% | horizontal 23% | vertical 14%
#
# [Augmentation 전략]
#   - RandAugment 대신 A.SomeOf 사용 (Albumentations 2.0+ 호환)
#   - 문서 도메인에 불필요한 색상 변환(Solarize, Posterize 등) 제외
#   - CLAHE를 전처리로 승격 (train/val 일치)
#   - 왜곡/가림은 별도 단계로 분리 (RandAugment 풀에 미포함)

# ============ 이미지 크기 ============
img_size: 384

# ============ 정규화 (ImageNet) ============
normalization:
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

# ============ Augmentation ============
augmentation:
  enabled: true
  # 혼동 쌍 전용 증강 (기본 비활성화)
  augmentation_confusion_pair_enabled: false
  # null이면 기본 세트(RandomRotate90+BrightnessContrast+GaussNoise) 사용
  confusion_pair_extra_augmentations: null

  # ==========================================================
  #                    학습 증강 파이프라인
  # ==========================================================
  # 적용 순서:
  #   1. Resize (AR 보존) → 2. CLAHE 전처리 → 3. 방향 변환
  #   → 4. SomeOf (RandAugment 대체) → 5. 왜곡 → 6. 가림
  # ==========================================================
  train_augmentations:

    # ============ 1단계: Resize (Aspect Ratio 보존) ============
    # 긴 쪽을 384로 맞추고 부족한 부분은 흰색(문서 배경색)으로 패딩
    - type: "LongestMaxSize"
      max_size: 384
      interpolation: 1     # INTER_LINEAR

    - type: "PadIfNeeded"
      min_height: 384
      min_width: 384
      border_mode: 0        # cv2.BORDER_CONSTANT
      fill: 255             # 흰색 패딩
      p: 1.0

    # ============ 2단계: CLAHE 전처리 (고정 적용) ============
    # 근거: 대비 mean 0.38로 낮음, val과 동일하게 p=1.0 고정
    # RandAugment의 Equalize/AutoContrast로는 local contrast를 대체 불가
    - type: "CLAHE"
      clip_limit: 4.0
      tile_grid_size: [8, 8]
      p: 1.0

    # ============ 3단계: 방향 변환 ============
    # 근거: vertical 14% + horizontal 23% → 다양한 스캔 방향 존재
    # RandomRotate90이 90/180/270도를 커버하므로 VerticalFlip은 제거
    - type: "RandomRotate90"
      p: 0.5

    - type: "HorizontalFlip"
      p: 0.3

    # ============ 4단계: SomeOf (RandAugment 대체) ============
    # 핵심 아이디어: N=2개를 랜덤 선택 (RandAugment와 동일)
    # 장점: 문서에 불필요한 Solarize/Posterize 등 제외 가능
    #       69% grayscale 데이터에 무의미한 색상 변환 배제
    #       fill 값을 문서 배경색(흰색)으로 제어 가능
    - type: "SomeOf"
      n: 2
      transforms:
        # 밝기/대비 조정 (그림자 24%, 낮은 대비 보완)
        - type: "RandomBrightnessContrast"
          brightness_limit: 0.3  # 0.2
          contrast_limit: 0.4    # 0.3
          p: 1.0

        # 선명도 조정 (moderate 47% 대응)
        - type: "Sharpen"
          alpha: [0.2, 0.5]
          lightness: [0.5, 1.0]
          p: 1.0

        # 원근 변환 (스캔 각도 다양화)
        - type: "Perspective"
          scale: [0.05, 0.15]   # 0.05, 0.1
          p: 1.0

        # 소각도 회전 + 전단 변환 (스캔 삐뚤어짐 대응)
        - type: "Affine"
          rotate: [-15, 15]
          shear: [-10, 10]
          p: 1.0

        # 그림자 증강 (24% shadow 대응)
        - type: "RandomShadow"
          shadow_roi: [0, 0.3, 1, 1]   # 0, 0.5, 1, 1
          num_shadows_limit: [1, 3]    # 1, 1
          shadow_dimension: 5
          p: 1.0

        # 추가된 항목 
        # 히스토그램 균일화 (대비 다양성 추가)
        - type: "Equalize"
          p: 1.0

        # 스캔 흐림 모사 (moderate 47.5% 대응)
        - type: "GaussianBlur"
          blur_limit: [3, 5]
          p: 1.0

        # 스캔 JPEG 열화 모사
        - type: "ImageCompression"
          quality_range: [60, 90]
          p: 1.0
      p: 1.0

    # ============ 5단계: 문서 특화 — 왜곡 ============
    # 근거: 66% high distortion → 별도 단계로 분리하여 확실하게 대응
    # SomeOf 안에 넣지 않는 이유: 왜곡은 독립적으로 항상 일정 확률 적용 필요
    - type: "GridDistortion"
      distort_limit: 0.3 # 0.2
      num_steps: 5       # 5
      p: 0.5             # 0.4   # 66% high distortion 반영

    # ElasticTransform (run_003 대비 yaml 누락 항목 복구)
    - type: "ElasticTransform"
      alpha: 80
      sigma: 6
      border_mode: 0
      fill: 255
      p: 0.25

    # ============ 6단계: 문서 특화 — 가림 (DocCutout) ============
    # 근거: 22% high occlusion, occlusion_score mean 0.097
    # 구멍 수 줄이고 크기 키움 (384의 8~20% 영역, DocCutout 방향)
    - type: "CoarseDropout"
      num_holes_range: [2, 4]     # 3, 6
      hole_height_range: [30, 80] # 10, 25
      hole_width_range: [30, 80]  # 10, 25
      fill: 255              # 문서 배경색(흰색) 유지
      p: 0.4  # 0.35

  # ==========================================================
  #              검증/테스트 증강 (최소 전처리)
  # ==========================================================
  # 원칙: train 전처리와 동일한 것만 적용 (CLAHE 포함)
  val_augmentations:
    # 1. Resize: Aspect ratio 유지
    - type: "LongestMaxSize"
      max_size: 384
      interpolation: 1

    # 2. Pad: 부족한 부분 흰색 패딩
    - type: "PadIfNeeded"
      min_height: 384
      min_width: 384
      border_mode: 0
      fill: 255
      p: 1.0

    # 3. CLAHE: train과 동일하게 고정 적용 (분포 일치)
    - type: "CLAHE"
      clip_limit: 4.0
      tile_grid_size: [8, 8]
      p: 1.0

    # 4. Normalize: datamodule에서 자동 추가

# ============ 데이터셋 분할 ============
train_val_split: 0.8

# ============ 클래스 불균형 처리 ============
use_class_weights: true

# ============ Pseudo-Labeling 설정 ============
pseudo_csv: null
pseudo_image_dir: "test/"
