# Inference 기본 설정

# 체크포인트 선택 우선순위:
# 1. checkpoint: 직접 경로 지정 (최우선)
# 2. run_id: 특정 실험 run ID 지정
# 3. 자동: champion → 최고 성능 모델 → 에러

# 체크포인트 직접 지정 (선택사항)
# checkpoint: "checkpoints/20260216_run_001/epoch=10-val_f1=0.950.ckpt"
checkpoint: null

# 실험 run ID 지정 (선택사항)
# 예: 20260216_run_001, 20260216_run_002
# run_id: "20260216_run_001"
run_id: null

# 출력 파일 경로
# null로 설정하면 자동으로 datasets_fin/submission/{model_name}_{run_id}.csv로 생성
# 직접 경로 지정: "datasets_fin/submission/my_prediction.csv"
output: null

# TTA (Test Time Augmentation) 사용 여부
# - false: 기본 예측 (빠름)
# - true: tta_level에 따라 augmentation 적용
use_tta: false

# TTA 레벨 (use_tta: true일 때만 적용)
# - "light"    : 5가지  (original, hflip, vflip, rot90, rot270)                   → 약 5×
# - "standard" : 8가지  (D4 완전 집합, rot180/transpose/anti_transpose 추가)        → 약 8×
# - "heavy"    : 11가지 (standard + brightness_up, brightness_down, sharpen)      → 약 11×
tta_level: "standard"

# 배치 크기 (추론 시 메모리에 따라 조정 가능)
# batch_size: 32
